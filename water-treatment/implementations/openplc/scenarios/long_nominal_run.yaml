scenario_id: "wt-uc1-long-nominal-run"
process_id: "WT-P1"
description: "Longer start-run-stop cycle to verify stable telemetry over time"
duration_sec: 110
poll_interval_ms: 500

initial_conditions:
  RW_Tank_Level: 600
  UF_UFFT_Tank_Level: 400
  ChemTreat_NaCl_Level: 800
  ChemTreat_NaOCl_Level: 800
  ChemTreat_HCl_Level: 800

timeline:
  - { time_sec: 5, action: hmi_start }
  - { time_sec: 90, action: hmi_stop }

expectations:
  final_state: SHUTDOWN
  must_reach_states: [RUNNING]
  event_count:
    hmi_start: 1
    hmi_stop: 1
  events_lead_to_state:
    hmi_start: RUNNING
    hmi_stop: SHUTDOWN
  min_samples: 170
  final_equals:
    RW_Pump_Sts: 0
    RW_Pump_Flow: 0

reference_bundle: null
