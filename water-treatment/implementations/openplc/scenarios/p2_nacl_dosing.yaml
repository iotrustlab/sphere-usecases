scenario_id: "wt-p2-nacl-dosing"
process_id: "WT-P2"
description: "Normal dosing run for Process 2: start the plant, select P2, open NaCl dosing, then shut down cleanly"
duration_sec: 80
poll_interval_ms: 500

initial_conditions:
  RW_Tank_Level: 600
  UF_UFFT_Tank_Level: 400
  ChemTreat_NaCl_Level: 800
  ChemTreat_NaOCl_Level: 800
  ChemTreat_HCl_Level: 800

timeline:
  - time_sec: 5
    action:
      process_id: WT-P1
      type: hmi_start
  - time_sec: 8
    action:
      process_id: WT-P2
      type: select_process
      active: true
  - time_sec: 10
    action:
      process_id: WT-P2
      type: set_manual_valve
      chemical: NaCl
      open: true
  - time_sec: 40
    action:
      process_id: WT-P2
      type: set_manual_valve
      chemical: NaCl
      open: false
  - time_sec: 45
    action:
      process_id: WT-P2
      type: select_process
      active: false
  - time_sec: 60
    action:
      process_id: WT-P1
      type: hmi_stop

expectations:
  final_state: SHUTDOWN
  must_reach_states: [RUNNING]
  event_count:
    hmi_start: 1
    hmi_stop: 1
  events_lead_to_state:
    hmi_start: RUNNING
    hmi_stop: SHUTDOWN
  min_samples: 120
  must_change:
    - ChemTreat_NaCl_Level
  ever_nonzero:
    - ChemTreat_NaCl_Valve_Sts
  final_equals:
    ChemTreat_NaCl_Valve_Sts: 0
    P2_Selected: 0
    P2_NaCl_Cmd: 0
    RW_Pump_Sts: 0
    RW_Pump_Flow: 0

reference_bundle: null
