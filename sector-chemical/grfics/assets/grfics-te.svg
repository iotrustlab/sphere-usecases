<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Arial, Helvetica, sans-serif" font-size="11">
  <defs>
    <symbol id="sym-valve" viewBox="0 0 30 30">
      <polygon points="0,0 15,15 0,30" fill="#3a6d8c" opacity="0.7"/>
      <polygon points="30,0 15,15 30,30" fill="#3a6d8c" opacity="0.7"/>
      <line x1="15" y1="0" x2="15" y2="30" stroke="#3a6d8c" stroke-width="2"/>
    </symbol>
    <symbol id="sym-reactor" viewBox="0 0 100 140">
      <ellipse cx="50" cy="20" rx="45" ry="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <rect x="5" y="20" width="90" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <ellipse cx="50" cy="120" rx="45" ry="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <rect x="5" y="20" width="90" height="10" fill="#e3f2fd"/>
      <line x1="50" y1="30" x2="50" y2="90" stroke="#1976d2" stroke-width="2"/>
      <line x1="35" y1="50" x2="65" y2="50" stroke="#1976d2" stroke-width="2"/>
      <line x1="35" y1="70" x2="65" y2="70" stroke="#1976d2" stroke-width="2"/>
      <rect x="15" y="85" width="70" height="25" fill="#90caf9" opacity="0.6"/>
      <text x="50" y="102" text-anchor="middle" font-size="8" fill="#1976d2">LIQUID</text>
    </symbol>
    <symbol id="sym-analyzer" viewBox="0 0 60 50">
      <rect x="2" y="2" width="56" height="46" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
      <text x="30" y="20" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">ANALYZER</text>
      <line x1="10" y1="28" x2="50" y2="28" stroke="#e65100" stroke-width="1"/>
      <text x="15" y="40" font-size="7" fill="#e65100">A B C</text>
    </symbol>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a6d8c"/>
    </marker>
  </defs>

  <rect width="1000" height="600" fill="#ffffff"/>

  <text x="500" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#3a6d8c">Tennessee Eastman Chemical Reactor (GRFICSv3)</text>

  <g id="group-feed">
    <text x="50" y="130" font-size="12" font-weight="bold" fill="#3a6d8c">FEED STREAMS</text>
    <g id="comp:Feed1_Valve" transform="translate(80, 180)">
      <use href="#sym-valve" width="40" height="40"/>
      <text x="20" y="55" text-anchor="middle" font-size="9" fill="#555">Feed 1</text>
      <rect id="anchor:Feed1_Valve:badge_pos" x="14" y="-21" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Feed1_Valve:flow_pos" x="14" y="44" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Feed1_Valve:sp_pos" x="14" y="-36" width="12" height="12" fill="transparent"/>
    </g>
    <g id="comp:Feed2_Valve" transform="translate(80, 300)">
      <use href="#sym-valve" width="40" height="40"/>
      <text x="20" y="55" text-anchor="middle" font-size="9" fill="#555">Feed 2</text>
      <rect id="anchor:Feed2_Valve:badge_pos" x="14" y="-21" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Feed2_Valve:flow_pos" x="14" y="44" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Feed2_Valve:sp_pos" x="14" y="-36" width="12" height="12" fill="transparent"/>
    </g>
  </g>

  <g id="group-tank">
    <text x="350" y="100" font-size="12" font-weight="bold" fill="#3a6d8c">REACTOR VESSEL</text>
    <g id="comp:Reactor" transform="translate(350, 120)">
      <use href="#sym-reactor" width="120" height="170"/>
      <text x="60" y="185" text-anchor="middle" font-size="11" fill="#555">REACTOR</text>
      <rect id="anchor:Reactor:pressure_pos" x="124" y="24" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Reactor:level_pos" x="124" y="114" width="12" height="12" fill="transparent"/>
    </g>
  </g>

  <g id="group-purge">
    <text x="600" y="120" font-size="12" font-weight="bold" fill="#3a6d8c">PURGE</text>
    <g id="comp:Purge_Valve" transform="translate(600, 150)">
      <use href="#sym-valve" width="40" height="40"/>
      <text x="20" y="55" text-anchor="middle" font-size="9" fill="#555">Purge</text>
      <rect id="anchor:Purge_Valve:flow_pos" x="14" y="44" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Purge_Valve:sp_pos" x="14" y="-36" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Purge_Valve:badge_pos" x="14" y="-21" width="12" height="12" fill="transparent"/>
    </g>
  </g>

  <g id="group-product">
    <text x="600" y="260" font-size="12" font-weight="bold" fill="#3a6d8c">PRODUCT</text>
    <g id="comp:Product_Valve" transform="translate(600, 280)">
      <use href="#sym-valve" width="40" height="40"/>
      <text x="20" y="55" text-anchor="middle" font-size="9" fill="#555">Product</text>
      <rect id="anchor:Product_Valve:badge_pos" x="14" y="-21" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Product_Valve:flow_pos" x="14" y="44" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Product_Valve:sp_pos" x="14" y="-36" width="12" height="12" fill="transparent"/>
    </g>
  </g>

  <g id="group-analyzer">
    <text x="780" y="120" font-size="12" font-weight="bold" fill="#3a6d8c">ANALYZER</text>
    <g id="comp:Analyzer" transform="translate(780, 140)">
      <use href="#sym-analyzer" width="100" height="80"/>
      <text x="50" y="95" text-anchor="middle" font-size="9" fill="#555">Composition</text>
      <rect id="anchor:Analyzer:compA_pos" x="4" y="94" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Analyzer:compB_pos" x="34" y="94" width="12" height="12" fill="transparent"/>
      <rect id="anchor:Analyzer:compC_pos" x="64" y="94" width="12" height="12" fill="transparent"/>
    </g>
  </g>

  <text x="50" y="420" font-size="10" fill="#555">Feed 1: A (48.5%), B (0.5%), C (51%)</text>
  <text x="50" y="440" font-size="10" fill="#555">Feed 2: Pure A (100%)</text>
  <text x="50" y="460" font-size="10" fill="#555">Reaction: A + C -&gt; D (liquid product)</text>
  <text x="50" y="480" font-size="10" fill="#555">Nominal: 2700 kPa, 45% level</text>
  <line x1="40" y1="200" x2="80" y2="200" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="120" y1="200" x2="350" y2="200" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="40" y1="320" x2="80" y2="320" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="120" y1="320" x2="300" y2="320" stroke="#3a6d8c" stroke-width="2.0"/>
  <line x1="300" y1="320" x2="300" y2="250" stroke="#3a6d8c" stroke-width="2.0"/>
  <line x1="300" y1="250" x2="350" y2="250" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="470" y1="170" x2="600" y2="170" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="640" y1="170" x2="720" y2="170" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="720" y1="170" x2="720" y2="180" stroke="#3a6d8c" stroke-width="2.0"/>
  <line x1="720" y1="180" x2="780" y2="180" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="470" y1="260" x2="550" y2="260" stroke="#3a6d8c" stroke-width="2.0"/>
  <line x1="550" y1="260" x2="550" y2="300" stroke="#3a6d8c" stroke-width="2.0"/>
  <line x1="550" y1="300" x2="600" y2="300" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>
  <line x1="640" y1="300" x2="720" y2="300" stroke="#3a6d8c" stroke-width="2.0" marker-end="url(#arrow)"/>

  <g id="group-feed">
    <rect id="anchor:TE_Feed1_Valve_Pos:badge_pos" x="135" y="175" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Feed1_Valve_SP:badge_pos" x="135" y="155" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Feed1_Flow:badge_pos" x="135" y="195" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Feed2_Valve_Pos:badge_pos" x="135" y="295" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Feed2_Valve_SP:badge_pos" x="135" y="275" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Feed2_Flow:badge_pos" x="135" y="315" width="60" height="20" fill="transparent"/>
  </g>
  <g id="group-tank">
    <rect id="anchor:TE_Tank_Pressure:badge_pos" x="480" y="150" width="80" height="20" fill="transparent"/>
    <rect id="anchor:TE_Tank_Level:badge_pos" x="480" y="240" width="80" height="20" fill="transparent"/>
  </g>
  <g id="group-purge">
    <rect id="anchor:TE_Purge_Valve_Pos:badge_pos" x="650" y="145" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Purge_Valve_SP:badge_pos" x="650" y="125" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Purge_Flow:badge_pos" x="650" y="165" width="60" height="20" fill="transparent"/>
  </g>
  <g id="group-product">
    <rect id="anchor:TE_Product_Valve_Pos:badge_pos" x="650" y="275" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Product_Valve_SP:badge_pos" x="650" y="255" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Product_Flow:badge_pos" x="650" y="295" width="60" height="20" fill="transparent"/>
  </g>
  <g id="group-analyzer">
    <rect id="anchor:TE_Purge_CompA:badge_pos" x="790" y="230" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Purge_CompB:badge_pos" x="790" y="250" width="60" height="20" fill="transparent"/>
    <rect id="anchor:TE_Purge_CompC:badge_pos" x="790" y="270" width="60" height="20" fill="transparent"/>
  </g>
  <text x="500" y="560" text-anchor="middle" font-size="10" fill="#8b949e">GRFICSv3 Tennessee Eastman Process - SPHERE Integration</text>
</svg>
